<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ Films Buttons</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #18222d; /* Kalar duhu irin ta Telegram */
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 95vh;
            justify-content: space-between;
        }
        .container {
            flex-grow: 1;
        }
        /* Jera mabuɗan guda biyu a jiri guda */
        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px; /* Round corners irin na hoton */
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }
        .btn-green {
            background-color: #3b9c45; /* Kore mai sanyi irin na bot din */
            color: white;
        }
        .btn-red {
            background-color: #b33939; /* Ja irin na Close */
            color: white;
            width: 100%;
        }
        .btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row">
            <button class="btn btn-green" onclick="tuntubiBot('data4')">Data4</button>
            <button class="btn btn-green" onclick="tuntubiBot('films')">Films</button>
        </div>
        
        <div class="row">
            <button class="btn btn-green" onclick="tuntubiBot('follow')">Follow</button>
            <button class="btn btn-green" onclick="tuntubiBot('nazifi')">Nazifi</button>
        </div>
    </div>

    <div>
        <button class="btn btn-red" onclick="rufeApp()">Close</button>
    </div>

    <script>
        Telegram.WebApp.ready();

        function tuntubiBot(sako) {
            Telegram.WebApp.sendData(sako); // Zai tura rubutun zuwa bot
        }

        function rufeApp() {
            Telegram.WebApp.close(); // Zai rufe shafin ya koma chat
        }
    </script>
</body>
</html>
